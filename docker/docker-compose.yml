services:
  postgres:
    image: postgres:16-alpine
    container_name: oxilo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oxilo_dev
      POSTGRES_USER: oxilo
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Port mapping removed to prevent conflicts with Django's native Postgres (5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxilo -d oxilo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oxilo_redis
    restart: unless-stopped
    # Port mapping removed to keep Redis isolated inside the Docker network
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build: 
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: oxilo_api
    restart: unless-stopped
    ports:
      - "3001:3001" # This is the only port exposed to Nginx
    env_file:
      - ../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount the local uploads folder so images survive container restarts!
      - ../apps/api/uploads:/app/apps/api/uploads

volumes:
  pgdata:
  redisdata:
